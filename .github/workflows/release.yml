name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      # tauri-action merges each platform into the same latest.json asset.
      # Running release builds one at a time avoids concurrent manifest writes.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            rust_targets: ""
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Activate Yarn classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Set up Rust
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Set up Rust
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      # tauri-action builds each platform, signs updater artifacts with our
      # minisign key, uploads the install bundle + update signature to one
      # draft GitHub Release, and merges platform entries into latest.json.
      # macOS still uses ad-hoc bundle signing from `tauri.conf.json`
      # (`bundle.macOS.signingIdentity = "-"`). Windows is intentionally not
      # Authenticode-signed, matching the current GitHub-only release model.
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ferx ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
