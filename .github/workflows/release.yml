name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Activate Yarn classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      # tauri-action builds the app, applies ad-hoc bundle signing from
      # `tauri.conf.json` (`bundle.macOS.signingIdentity = "-"`) before
      # packaging, signs updater artifacts with our minisign key (not
      # Apple's Developer ID), uploads the DMG + tarball + signature to a
      # draft GitHub Release, and emits `latest.json` next to them.
      # The updater endpoint in tauri.conf.json points at
      # `/releases/latest/download/latest.json`, so promoting the draft
      # release to "latest" is what rolls the update out to users.
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ferx ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
