name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Activate Yarn classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Set up Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Run Svelte checks
        run: yarn check

      - name: Run Vitest suite
        run: yarn test --run

      - name: Run Rust library tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Verify tauri-commands.ts is up to date
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --lib tauri_commands_typescript_is_up_to_date
          git diff --exit-code src/lib/tauri-commands.ts || (echo "::error::tauri-commands.ts is stale — run 'yarn tauri dev' to regenerate and commit the result." && exit 1)
